<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7"/>
      <stop offset="100%" style="stop-color:#4834D4"/>
    </linearGradient>
    <linearGradient id="face" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#F0EDFF"/>
    </linearGradient>
    <linearGradient id="antenna" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A29BFE"/>
      <stop offset="100%" style="stop-color:#6C5CE7"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>

  <!-- Signal waves (remote control / voice) -->
  <path d="M 120 140 A 100 100 0 0 1 120 280" fill="none" stroke="#A29BFE" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
  <path d="M 100 165 A 70 70 0 0 1 100 255" fill="none" stroke="#A29BFE" stroke-width="8" stroke-linecap="round" opacity="0.35"/>
  <path d="M 392 140 A 100 100 0 0 0 392 280" fill="none" stroke="#A29BFE" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
  <path d="M 412 165 A 70 70 0 0 0 412 255" fill="none" stroke="#A29BFE" stroke-width="8" stroke-linecap="round" opacity="0.35"/>

  <!-- Antenna -->
  <line x1="256" y1="130" x2="256" y2="90" stroke="url(#antenna)" stroke-width="10" stroke-linecap="round"/>
  <circle cx="256" cy="80" r="14" fill="#A29BFE"/>
  <circle cx="256" cy="80" r="7" fill="#DDD6FE"/>

  <!-- Robot head / face (rounded rectangle) -->
  <rect x="155" y="140" width="202" height="170" rx="40" ry="40" fill="url(#face)"/>

  <!-- Eyes -->
  <circle cx="215" cy="215" r="22" fill="#4834D4"/>
  <circle cx="297" cy="215" r="22" fill="#4834D4"/>
  <!-- Eye highlights -->
  <circle cx="222" cy="208" r="7" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="304" cy="208" r="7" fill="#FFFFFF" opacity="0.9"/>

  <!-- Smile -->
  <path d="M 220 265 Q 256 295 292 265" fill="none" stroke="#4834D4" stroke-width="8" stroke-linecap="round"/>

  <!-- Body -->
  <rect x="185" y="320" width="142" height="90" rx="20" ry="20" fill="url(#face)"/>

  <!-- Body detail lines -->
  <line x1="220" y1="340" x2="220" y2="390" stroke="#DDD6FE" stroke-width="4" stroke-linecap="round"/>
  <line x1="256" y1="340" x2="256" y2="390" stroke="#DDD6FE" stroke-width="4" stroke-linecap="round"/>
  <line x1="292" y1="340" x2="292" y2="390" stroke="#DDD6FE" stroke-width="4" stroke-linecap="round"/>

  <!-- Arms -->
  <rect x="130" y="335" width="45" height="20" rx="10" ry="10" fill="#A29BFE"/>
  <rect x="337" y="335" width="45" height="20" rx="10" ry="10" fill="#A29BFE"/>

  <!-- Feet -->
  <rect x="200" y="415" width="40" height="24" rx="12" ry="12" fill="#A29BFE"/>
  <rect x="272" y="415" width="40" height="24" rx="12" ry="12" fill="#A29BFE"/>
</svg>
